services:
  # ── LibreChat (Core AI Engine) ──────────────────────────────
  librechat:
    image: ghcr.io/danny-avila/librechat-dev:latest
    container_name: ai-platform-librechat
    ports:
      - "3080:3080"
    env_file: .env
    volumes:
      - ./LibreChat-config/librechat.yaml:/app/librechat.yaml
      - ./uploads:/app/client/public/images/uploads
      - ./logs:/app/api/logs
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_started
      rag_api:
        condition: service_started
    networks: [ai-net]
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ai-platform-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [ai-net]
    restart: unless-stopped

  # ── MeiliSearch ─────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: ai-platform-meili
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili-data:/meili_data
    networks: [ai-net]
    restart: unless-stopped

  # ── PostgreSQL + pgvector (RAG) ─────────────────────────────
  vectordb:
    image: pgvector/pgvector:pg16
    container_name: ai-platform-pgvector
    environment:
      POSTGRES_DB: librechat
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -d librechat
      interval: 10s
      retries: 5
    networks: [ai-net]
    restart: unless-stopped

  # ── RAG API ─────────────────────────────────────────────────
  rag_api:
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: ai-platform-rag
    env_file: .env
    depends_on:
      vectordb:
        condition: service_healthy
    networks: [ai-net]
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-platform-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks: [ai-net]
    restart: unless-stopped

  # ── 🦙 OLLAMA (FREE Local LLMs) — NEW ──────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ai-platform-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=24h
    networks: [ai-net]
    restart: unless-stopped
    # For GPU support (uncomment if you have NVIDIA GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Node.js API Gateway ─────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ai-platform-gateway
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      LIBRECHAT_URL: http://librechat:3080
      MCP_TOOLS_URL: http://mcp-tools:3001
      MCP_DB_URL:    http://mcp-db:3002
      MCP_FILES_URL: http://mcp-files:3003
      MCP_RESEARCH_URL: http://mcp-research:3004
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - librechat
      - redis
    networks: [ai-net]
    restart: unless-stopped

  # ── MCP Tools Server (:3001) ────────────────────────────────
  mcp-tools:
    build:
      context: ./mcp-servers/tools-server
      dockerfile: Dockerfile
    container_name: ai-platform-mcp-tools
    ports:
      - "3001:3001"
    env_file: .env
    networks: [ai-net]
    restart: unless-stopped

  # ── MCP Database Server (:3002) ─────────────────────────────
  mcp-db:
    build:
      context: ./mcp-servers/db-server
      dockerfile: Dockerfile
    container_name: ai-platform-mcp-db
    ports:
      - "3002:3002"
    env_file: .env
    networks: [ai-net]
    restart: unless-stopped

  # ── 📊 MCP File Analysis Server (:3003) — NEW ───────────────
  mcp-files:
    build:
      context: ./mcp-servers/file-analysis-server
      dockerfile: Dockerfile
    container_name: ai-platform-mcp-files
    ports:
      - "3003:3003"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads:ro    # read-only access to uploads
    networks: [ai-net]
    restart: unless-stopped

  # ── 🔬 MCP Research Server (:3004) — NEW ────────────────────
  mcp-research:
    build:
      context: ./mcp-servers/research-server
      dockerfile: Dockerfile
    container_name: ai-platform-mcp-research
    ports:
      - "3004:3004"
    env_file: .env
    networks: [ai-net]
    restart: unless-stopped

  # ── React App ───────────────────────────────────────────────
  react-app:
    build:
      context: ./react-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ai-platform-react
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks: [ai-net]
    restart: unless-stopped

volumes:
  mongodb-data:
  meili-data:
  pgvector-data:
  redis-data:
  ollama-data:      # persists downloaded models between restarts

networks:
  ai-net:
    driver: bridge
